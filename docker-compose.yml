services:
  mini-identity-api:
    build:
      context: ./backend/mini-identity-api-dotnet-main
      dockerfile: Dockerfile
    container_name: mini-identity-api
    ports:
      - "5132:5132"

  edurag-backend:
    build:
      context: ./backend/EduRAG
      dockerfile: Dockerfile
    container_name: edurag-backend
    environment:
      ConnectionStrings__DefaultConnection: Data Source=/app/edurag.db
    ports:
      - "5004:5004"

  edurag-frontend:
    build:
      context: ./frontend/edurag-frontend
      dockerfile: Dockerfile
    container_name: edurag-frontend
    ports:
      - "5173:5173"
    depends_on:
      - mini-identity-api
      - edurag-backend
